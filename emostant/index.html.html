<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="emo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="icon" href="emotional.png">

<body>
    <div class="black-overlay"></div>
    <h2 class="head">EMOSTANT</h2>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form action="#">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fa fa-facebook"></i></a>
                    <a href="#" class="social"><i class="fa-fa-google"></i></a>
                    <a href="#" class="social"><i class="fa-fa-instagram"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" />
                <input type="email" placeholder="Email" />
                <input type="password" id="passwordInputSignUp" placeholder="Password" />
<label for="showPasswordSignUp">
    <input type="checkbox" id="showPasswordSignUp" class="cbox" onclick="togglePasswordVisibility('passwordInputSignUp')" />
    Show Password
</label>

                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form action="#">
                <h1>Sign in</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fa-fa-facebook"></i></a>
                    <a href="#" class="social"><i class="fa-fa-google"></i></a>
                    <a href="#" class="social"><i class="fa-fa-instagram"></i></a>
                </div>
                <span>or use your account</span>
                <input type="email" placeholder="Email" />
                <!-- Inside the signin form -->
<input type="password" id="passwordInputSignIn" placeholder="Password" />

<!-- Inside the label for "Show Password" -->
<label for="showPasswordSignIn">
    <input type="checkbox" id="showPasswordSignIn" class="cbox"  onclick="togglePasswordVisibility('passwordInputSignIn')" />
    Show Password
</label>

                <a href="#">Forgot your password?</a>
                <button>Sign In</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <h5>"Feel the connection? Sign in with your emotions!"</h5>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                   <h5>"Connect through Emotion,Sign Up Today!"
                </h5>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
