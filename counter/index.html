<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newyear</title>
    <link rel="icon" href="2011.i211.033..pyrotechnics fireworks realistic city background.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
    <p>CountDown to</p>
    <h2 class="newyear">New Year</h2>
    <div class="counter">
        <div>
       <h1 id="days">00</h1>
       <small>Days</small>
    </div>
    <div>
       <h1 id="hours">00</h1>
       <small>Hours</small>
    </div>
    <div>
       <h1 id="minutes">00</h1>
       <small>Minutes</small>
    </div>
       <div><h1 id="seconds">00</h1>
       <small>Seconds</small>
    </div>
    </div>
</div>
<script>
    const days=document.querySelector("#days")
    const hours=document.querySelector("#hours")
    const minutes=document.querySelector("#minutes")
    const seconds=document.querySelector("#seconds")

    function updateTime(){
    const currentYear=new Date().getFullYear();
    const newYear=new Date(`January 1 ${currentYear + 1} 00:00:00`)
    const currentDate=new Date;
    const diff=newYear-currentDate;
    const d=Math.floor(diff/1000/60/60/24);
    const h=Math.floor((diff/1000/60/60)%24);
    const m=Math.floor((diff/1000/60)%60)
    const s=Math.floor((diff/1000)%60)
    days.innerHTML=d<10?"0"+d:d;
    hours.innerHTML=h<10?"0"+h:h;
    minutes.innerHTML=m<10?"0"+m:m;
    seconds.innerHTML=s<10?"0"+s:s;
   }
   setInterval(updateTime,1000);
</script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Inspiration&family=Poppins:wght@400;700&display=swap');
