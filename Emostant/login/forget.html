<html lang="en">

  <title>Forget Password</title>
  <link rel="stylesheet" href="style.css"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<div class="heade">Forget Password</div>

<div class="container">
  <div class="inner-container">
    <form action="#" method="POST">
      <input type="email" placeholder="Enter your email" required>
      <button role="button"><span class="text">Reset</span><span id="look">Look at your mail</span></button>
    </form>
    <div id="sign">Remembered your password? <a href="index.html">Sign in</a></div>
  </div>
</div>

</body>
