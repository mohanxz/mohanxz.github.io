<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emostant</title>
    <link rel="stylesheet" href="main.css">
    <link rel="icon" href="/images/emo.png"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Emostant</h1>
      <h3>We Care Your Emotions</h3>
    </div>
    <div class="profile">
      <div class="profile-pic">
        <label class="-label" for="file">
          <span class="glyphicon glyphicon-camera"></span>
          <span class="button">Change Image</span>
        </label>
        <input id="file" type="file" onchange="loadFile(event)"/>
        <img src="" id="output" width="200" />
      </div>
      <div class="bio">
        <p class="name">Gunasree</p>
        <p class="about">Things to be passed over in silence</p>
      </div>
    </div>
  </div>
  
  <script>

    // Function to load the profile image
    var loadFile = function(event) {
      var image = document.getElementById("output");
      var imageUrl = URL.createObjectURL(event.target.files[0]);
      image.src = imageUrl;
      
      // Save the image URL to local storage
      localStorage.setItem("profileImage", imageUrl);
    };                                                

    // Function to check if the profile image exists in local storage and load it
    window.onload = function() {
      var profileImage = localStorage.getItem("profileImage");
      if (profileImage) {
        var image = document.getElementById("output");
        image.src = profileImage;
      }
    };
  </script>
</body>
</html>
