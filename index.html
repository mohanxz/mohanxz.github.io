  <style> @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
.circles{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.circles li{
  position: absolute;
  display: block;
  list-style: none;
  width: 20px;
  height: 20px;
  background-color: #ff3cac;
  background-image: linear-gradient(225deg, #ff3cac 0%, #784ba0 50%, #2b86c5 100%);
  animation: animate 25s linear infinite;
  bottom: -150px;
}

.circles li:nth-child(1){
  left: 25%;
  width: 80px;
  height: 80px;
  animation-delay: 0s;
}

.circles li:nth-child(2){
  left: 10%;
  width: 20px;
  height: 20px;
  animation-delay: 2s;
  animation-duration: 12s;
}

.circles li:nth-child(3){
  left: 70%;
  width: 20px;
  height: 20px;
  animation-delay: 4s;
}

.circles li:nth-child(4){
  left: 40%;
  width: 60px;
  height: 60px;
  animation-delay: 0s;
  animation-duration: 18s;
}

.circles li:nth-child(5){
  left: 65%;
  width: 20px;
  height: 20px;
  animation-delay: 0s;
}

.circles li:nth-child(6){
  left: 75%;
  width: 110px;
  height: 110px;
  animation-delay: 3s;
}

.circles li:nth-child(7){
  left: 35%;
  width: 150px;
  height: 150px;
  animation-delay: 7s;
}

.circles li:nth-child(8){
  left: 50%;
  width: 25px;
  height: 25px;
  animation-delay: 15s;
  animation-duration: 45s;
}

.circles li:nth-child(9){
  left: 20%;
  width: 15px;
  height: 15px;
  animation-delay: 2s;
  animation-duration: 35s;
}

.circles li:nth-child(10){
  left: 85%;
  width: 150px;
  height: 150px;
  animation-delay: 0s;
  animation-duration: 11s;
}

@keyframes animate {

  0%{
    transform: translateY(0) rotate(0deg);
    opacity: 1;
    border-radius: 0;
  }

  100%{
    transform: translateY(-1000px) rotate(720deg);
    opacity: 0;
    border-radius: 50%;
  }

}

a:hover {

}
button {
  font-weight: 300;
  position: absolute;
  top: calc(50% + 300px);
  left: 1%;
  transform: translate(-50%, -50%);
  display: block;
  height: 100px;
  width: 300px;
  padding: 5px 5px;
  font-family: 'Poppins', sans-serif;

  color: #fff;
  border: 1px #fff solid;
  overflow: hidden;
  background: none;
  margin-bottom: -400px;
  z-index: 1;
  cursor: pointer;
  transition: 0.3s ease-in;
  -o-transition: 0.03s ease-in;
  -ms-transition: 0.03s ease-in;
  -moz-transition: 0.03s ease-in;
  -webkit-transition: 0.03s ease-in;
  border-radius: 25px;
}

button:focus {
  outline: none;
}
.fill:hover {
  color: #fff;
  border: 1px #fff solid;
}
.fill:before {
  content: "";
  position: absolute;
  background: linear-gradient(225deg, #ff3cac 0%, #784ba0 50%, #2b86c5 100%);
  bottom: 0;
  left: 0;
  right: 100%;
  top: 0;
  z-index: -1;
  -webkit-transition: right 0.3s ease-in;
}
.fill:hover:before {
  right: 0;
}
